name: Test

on:
  schedule:
    # Runs every Monday at 00:00 UTC, which is Monday 08:00 in Asia/Shanghai.
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  weekly:
    runs-on: ubuntu-latest

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: https://open.bigmodel.cn/api/paas/v4/
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'glm-4.5-air' }}
      LLM_TEMPERATURE: "1"
      LLM_REQUEST_TIMEOUT_SECONDS: "90"
      OPENAI_MAX_RETRIES: "0"
      LLM_RETRY_ATTEMPTS: "1"
      LLM_RETRY_BACKOFF_SECONDS: "2"
      LLM_MAX_TOTAL_RETRY_SECONDS: "6"
      LLM_MAX_TOKENS: "1200"
      LLM_DISABLE_THINKING: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r cfgs/pkgs/requirements.txt

      - name: Smoke test GLM 4.5 Air
        run: |
          python - <<'PY'
          import os
          from openai import OpenAI

          client = OpenAI(
              api_key=os.environ["OPENAI_API_KEY"],
              base_url=os.environ["OPENAI_BASE_URL"],
              timeout=float(os.environ.get("LLM_REQUEST_TIMEOUT_SECONDS", "90")),
              max_retries=int(os.environ.get("OPENAI_MAX_RETRIES", "0")),
          )

          resp = client.chat.completions.create(
              model=os.environ["OPENAI_MODEL"],
              messages=[{"role": "user", "content": "只回复 ok"}],
              max_tokens=16,
              extra_body={"thinking": {"type": "disabled"}},
          )
          print(resp.choices[0].message.content)
          PY

      - name: Run weekly literature survey pipeline
        run: python -m pkgs.surveys.clis.run --max_results 10 --card_limit 5

      - name: Build dated weekly snapshot
        run: |
          RUN_STAMP="$(date -u +'%Y-%m-%d_%H%M%S')"
          SNAPSHOT_ROOT="snps/weeklies/${RUN_STAMP}"
          mkdir -p "${SNAPSHOT_ROOT}"
          cp -R dats "${SNAPSHOT_ROOT}/dats"
          cp -R outs "${SNAPSHOT_ROOT}/outs"
          (cd snps/weeklies && zip -rq "weekly-results-${RUN_STAMP}.zip" "${RUN_STAMP}")
          
      - name: Commit generated data and reports
  run: |
    git config user.name "github-actions[bot]"
    git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
    git add -A dats outs snps
    if git diff --cached --quiet; then
      echo "No generated changes to commit."
    else
      git commit -m "chore: update weekly literature survey"
      git push
    fi
       
